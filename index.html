<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Quizonator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
    }
    .app {
        max-width: 800px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        padding: 20px 25px 30px;
    }
    h1 {
        text-align: center;
        margin-top: 0;
    }
    .hidden {
        display: none;
    }
    textarea {
        width: 100%;
        height: 200px;
        font-family: Consolas, monospace;
        font-size: 13px;
        box-sizing: border-box;
    }
    label {
        font-weight: bold;
    }
    .row {
        margin-top: 15px;
    }
    .controls {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
    }
    input[type="number"] {
        width: 80px;
        padding: 5px;
    }
    button {
        padding: 7px 16px;
        border-radius: 4px;
        border: none;
        cursor: pointer;
        background: #1976d2;
        color: #fff;
        font-weight: bold;
    }
    button:disabled {
        background: #9e9e9e;
        cursor: default;
    }
    .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    .quiz-question {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 10px;
    }
    .answers {
        margin-top: 10px;
    }
    .answer-option {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 7px;
        border-radius: 4px;
        margin-bottom: 4px;
    }
    .answer-option.correct {
        background-color: #c8e6c9;
    }
    .answer-option.incorrect {
        background-color: #ffcdd2;
    }
    
    /* STYLE DLA SORTOWANIA */
    .sortable-list {
        list-style: none;
        padding: 0;
        margin: 10px 0;
    }
    .sortable-item {
        background: #f9f9f9;
        border: 2px solid #ddd;
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 8px;
        cursor: move;
        user-select: none;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .sortable-item:hover {
        background: #f0f0f0;
    }
    .sortable-item.dragging {
        opacity: 0.5;
    }
    .sortable-item.correct {
        background-color: #c8e6c9;
        border-color: #4caf50;
    }
    .sortable-item.incorrect {
        background-color: #ffcdd2;
        border-color: #f44336;
    }
    /* Pozycja w kolejności (1, 2, 3, 4) */
    .position-number {
        font-weight: bold;
        color: #1976d2;
        min-width: 25px;
        font-size: 16px;
    }
    /* Numer odpowiedzi (pozostaje przy odpowiedzi) */
    .answer-label {
        font-weight: bold;
        color: #666;
        min-width: 20px;
    }
    .sortable-item.checked .position-number {
        color: #666;
    }
    
    .feedback {
        margin-top: 10px;
        font-weight: bold;
    }
    .feedback.ok {
        color: #2e7d32;
    }
    .feedback.bad {
        color: #c62828;
    }
    .nav-buttons {
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
    }
    .progress {
        font-size: 14px;
        color: #555;
    }
    .summary-item {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 8px 10px;
        margin-bottom: 8px;
        background: #fafafa;
    }
    .summary-item h3 {
        margin: 0 0 4px;
        font-size: 14px;
    }
    .summary-correct {
        color: #2e7d32;
        font-weight: bold;
    }
    .summary-wrong {
        color: #c62828;
        font-weight: bold;
    }
    .summary-block {
        margin-top: 3px;
        padding-left: 10px;
        font-size: 13px;
    }
    .summary-block div {
        margin-bottom: 2px;
    }

    @media (max-width: 600px) {
        body {
            padding: 10px;
        }
        .app {
            padding: 15px;
        }
        .controls {
            flex-direction: column;
            align-items: flex-start;
        }
        .controls button, .nav-buttons button, #summaryBackToMenuBtn {
            width: 100%;
            padding: 12px;
        }
        .nav-buttons {
            flex-direction: column;
        }
        .quiz-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }
    }
</style>
</head>
<body>
<div class="app">
    <h1>Quizonator</h1>

    <!-- MENU GŁÓWNE -->
    <div id="menuScreen">
        <div class="row">
            <label for="questionsInput">Pytania (gwiazdka * przy poprawnych, cyfra przed literą dla kolejności):</label>
            <textarea id="questionsInput"></textarea>
        </div>

        <div class="row controls">
            <label for="questionCount">Ile pytań wylosować:</label>
            <input type="number" id="questionCount" min="1" value="5" />
            <button id="startBtn">Start</button>
        </div>
    </div>

    <!-- EKRAN QUIZU -->
    <div id="quizScreen" class="hidden">
        <div class="quiz-header">
            <div id="quizQuestionNumber"></div>
            <div id="quizProgress" class="progress"></div>
        </div>
        <div id="quizQuestionText" class="quiz-question"></div>
        <div id="quizAnswers" class="answers"></div>
        <div id="quizFeedback" class="feedback"></div>

        <div class="nav-buttons">
            <button id="backToMenuBtn">Powrót do menu</button>
            <button id="prevQuestionBtn">Cofnij</button>
            <button id="checkNextBtn">Sprawdź</button>
        </div>
    </div>

    <!-- PODSUMOWANIE -->
    <div id="summaryScreen" class="hidden">
        <h2>Podsumowanie</h2>
        <div id="summaryResult"></div>
        <div id="summaryList"></div>
        <div class="row">
            <button id="summaryBackToMenuBtn">Powrót do menu</button>
        </div>
    </div>
</div>

<script>
// PRZYKŁADOWE PYTANIA
const RAW_QUESTIONS = `
1.	Rachunek zysków i strat to sprawozdanie finansowe prezentujące:
*a)	wynik finansowy w ujęciu memoriałowym,
b)	odroczony podatek dochodowy,
c)	wpływy i wydatki,
d)	wynik finansowy w ujęciu kasowym.

22.	Ułóż w odpowiedniej kolejności (od pierwszego do ostatniego) etapy zarządzania ryzykiem
2a)	pomiar 
4b)	monitorowanie i kontrolowanie 
1c)	identyfikacja 
3d)	sterowanie

2.	Zmiana stanu produktów prezentowana jest w rachunku zysków i strat po stronie:
*a)	przychodów ze sprzedaży,
b)	kosztów wytworzenia wyrobów gotowych,
c)	przychodów z pozostałej działalności operacyjnej,
d)	kosztów finansowych.
`;

document.getElementById('questionsInput').value = RAW_QUESTIONS.trim();

// stan aplikacji
let allQuestions = [];
let quizQuestions = [];
let currentIndex = 0;
let userAnswers = [];
let checkedQuestions = [];
let quizFinished = false;

// PARSOWANIE PYTAŃ - ROZSZERZONE O PYTANIA SORTUJĄCE
function parseQuestions(raw) {
    const blocks = raw
        .split(/\n\s*\n/)
        .map(b => b.trim())
        .filter(b => b.length > 0);

    const parsed = [];

    blocks.forEach(block => {
        const lines = block
            .split('\n')
            .map(l => l.trim())
            .filter(l => l.length > 0);

        if (lines.length < 2) return;

        const first = lines[0];
        const m = first.match(/^(\d+)\.\s*(.*)$/);
        let qText = first;
        if (m) {
            qText = m[2].trim();
        }

        const answers = [];
        const answerLabels = []; // etykiety a), b), c), d)
        const correctIndexes = [];
        let isSortQuestion = false;
        const sortOrder = [];

        for (let i = 1; i < lines.length; i++) {
            let line = lines[i];
            let isCorrect = false;

            // Sprawdź czy to pytanie sortujące (cyfra przed literą)
            const sortMatch = line.match(/^(\d+)([a-zA-Z])\)\s*(.*)$/);
            if (sortMatch) {
                isSortQuestion = true;
                const orderNum = parseInt(sortMatch[1], 10);
                const label = sortMatch[2];
                const text = sortMatch[3].trim();
                const idx = answers.length;
                answers.push(text);
                answerLabels.push(label + ')');
                sortOrder.push({ idx, orderNum });
                continue;
            }

            // Standardowe pytanie z gwiazdką
            if (line.startsWith('*')) {
                isCorrect = true;
                line = line.substring(1).trim();
            }

            const ansMatch = line.match(/^([a-zA-Z])\)\s*(.*)$/);
            if (!ansMatch) continue;
            const label = ansMatch[1];
            const text = ansMatch[2].trim();
            const idx = answers.length;
            answers.push(text);
            answerLabels.push(label + ')');
            if (isCorrect) correctIndexes.push(idx);
        }

        if (answers.length > 0) {
            if (isSortQuestion && sortOrder.length > 0) {
                // Pytanie sortujące
                sortOrder.sort((a, b) => a.orderNum - b.orderNum);
                const correctOrder = sortOrder.map(item => item.idx);
                parsed.push({
                    text: qText,
                    answers,
                    answerLabels,
                    correctOrder,
                    type: 'sort'
                });
            } else if (correctIndexes.length > 0) {
                // Standardowe pytanie
                parsed.push({
                    text: qText,
                    answers,
                    answerLabels,
                    correctIndexes,
                    type: 'standard'
                });
            }
        }
    });

    return parsed;
}

// LOSOWANIE PYTAŃ
function pickRandomQuestions(all, n) {
    const idx = all.map((_, i) => i);
    for (let i = idx.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [idx[i], idx[j]] = [idx[j], idx[i]];
    }
    return idx.slice(0, n).map(i => all[i]);
}

// PORÓWNANIE ODPOWIEDZI - ROZSZERZONE O SORTOWANIE
function isUserCorrect(user, question) {
    if (question.type === 'sort') {
        if (user.length !== question.correctOrder.length) return false;
        for (let i = 0; i < user.length; i++) {
            if (user[i] !== question.correctOrder[i]) return false;
        }
        return true;
    } else {
        if (user.length !== question.correctIndexes.length) return false;
        const setU = new Set(user);
        for (const c of question.correctIndexes) {
            if (!setU.has(c)) return false;
        }
        return true;
    }
}

// ZAPIS WYBORU BIEŻĄCEGO PYTANIA
function saveCurrentSelection() {
    const q = quizQuestions[currentIndex];
    
    if (q.type === 'sort') {
        const items = document.querySelectorAll('#quizAnswers .sortable-item');
        const order = [];
        items.forEach(item => {
            order.push(parseInt(item.dataset.index, 10));
        });
        userAnswers[currentIndex] = order;
    } else {
        const inputs = document.querySelectorAll('#quizAnswers input[name="answer"]');
        const chosen = [];
        inputs.forEach(input => {
            if (input.checked) {
                chosen.push(parseInt(input.value, 10));
            }
        });
        userAnswers[currentIndex] = chosen;
    }
}

// DRAG AND DROP
let draggedElement = null;

function handleDragStart(e) {
    draggedElement = e.target;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}

function handleDragEnd(e) {
    e.target.classList.remove('dragging');
    updatePositionNumbers();
}

function handleDragOver(e) {
    if (e.preventDefault) {
        e.preventDefault();
    }
    e.dataTransfer.dropEffect = 'move';
    return false;
}

function handleDragEnter(e) {
    if (e.target.classList.contains('sortable-item')) {
        e.target.style.borderTop = '3px solid #1976d2';
    }
}

function handleDragLeave(e) {
    if (e.target.classList.contains('sortable-item')) {
        e.target.style.borderTop = '2px solid #ddd';
    }
}

function handleDrop(e) {
    if (e.stopPropagation) {
        e.stopPropagation();
    }
    e.preventDefault();

    if (draggedElement !== e.target && e.target.classList.contains('sortable-item')) {
        const list = document.querySelector('.sortable-list');
        const items = Array.from(list.children);
        const draggedIndex = items.indexOf(draggedElement);
        const targetIndex = items.indexOf(e.target);

        if (draggedIndex < targetIndex) {
            e.target.parentNode.insertBefore(draggedElement, e.target.nextSibling);
        } else {
            e.target.parentNode.insertBefore(draggedElement, e.target);
        }
    }

    if (e.target.classList.contains('sortable-item')) {
        e.target.style.borderTop = '2px solid #ddd';
    }

    updatePositionNumbers();
    return false;
}

// AKTUALIZACJA NUMERÓW POZYCJI (1, 2, 3, 4)
function updatePositionNumbers() {
    const items = document.querySelectorAll('.sortable-list .sortable-item');
    items.forEach((item, index) => {
        const posNum = item.querySelector('.position-number');
        if (posNum) {
            posNum.textContent = `${index + 1}.`;
        }
    });
}

// RENDER PYTANIA
function renderQuestion() {
    const q = quizQuestions[currentIndex];
    const qNumEl = document.getElementById('quizQuestionNumber');
    const progressEl = document.getElementById('quizProgress');
    const qTextEl = document.getElementById('quizQuestionText');
    const answersEl = document.getElementById('quizAnswers');
    const feedbackEl = document.getElementById('quizFeedback');
    const prevBtn = document.getElementById('prevQuestionBtn');
    const checkNextBtn = document.getElementById('checkNextBtn');

    const displayNumber = currentIndex + 1;
    qNumEl.textContent = 'Pytanie ' + displayNumber;
    progressEl.textContent = `Pytanie ${displayNumber} z ${quizQuestions.length}`;
    qTextEl.textContent = q.text;

    answersEl.innerHTML = '';
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';

    const alreadyChecked = !!checkedQuestions[currentIndex];
    const user = userAnswers[currentIndex] || [];

    if (q.type === 'sort') {
        // PYTANIE SORTUJĄCE
        const ul = document.createElement('ul');
        ul.className = 'sortable-list';

        let displayOrder;
        if (user.length > 0) {
            displayOrder = user;
        } else {
            displayOrder = q.answers.map((_, idx) => idx);
        }

        displayOrder.forEach((ansIdx, position) => {
            const li = document.createElement('li');
            li.className = 'sortable-item';
            li.dataset.index = ansIdx;
            li.draggable = !alreadyChecked;

            // Pozycja w kolejności (zmienna)
            const posSpan = document.createElement('span');
            posSpan.className = 'position-number';
            posSpan.textContent = `${position + 1}.`;

            // Etykieta odpowiedzi (stała, np. a), b), c), d))
            const labelSpan = document.createElement('span');
            labelSpan.className = 'answer-label';
            labelSpan.textContent = q.answerLabels[ansIdx];

            // Tekst odpowiedzi
            const textSpan = document.createElement('span');
            textSpan.textContent = q.answers[ansIdx];

            li.appendChild(posSpan);
            li.appendChild(labelSpan);
            li.appendChild(textSpan);

            if (!alreadyChecked) {
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragend', handleDragEnd);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('dragenter', handleDragEnter);
                li.addEventListener('dragleave', handleDragLeave);
                li.addEventListener('drop', handleDrop);
            } else {
                li.classList.add('checked');
                if (q.correctOrder[position] === ansIdx) {
                    li.classList.add('correct');
                } else {
                    li.classList.add('incorrect');
                }
            }

            ul.appendChild(li);
        });

        answersEl.appendChild(ul);

        if (alreadyChecked) {
            const correct = isUserCorrect(user, q);
            if (correct) {
                feedbackEl.textContent = 'Prawidłowa kolejność!';
                feedbackEl.classList.add('ok');
            } else {
                feedbackEl.textContent = 'Błędna kolejność.';
                feedbackEl.classList.add('bad');
            }
        }

    } else {
        // STANDARDOWE PYTANIE
        const multiple = q.correctIndexes.length > 1;
        const inputType = multiple ? 'checkbox' : 'radio';
        const correctSet = new Set(q.correctIndexes);
        const userSet = new Set(user);

        q.answers.forEach((ans, idx) => {
            const label = document.createElement('label');
            label.className = 'answer-option';

            const input = document.createElement('input');
            input.type = inputType;
            input.name = 'answer';
            input.value = idx;
            if (userSet.has(idx)) {
                input.checked = true;
            }
            if (alreadyChecked) {
                input.disabled = true;
                if (correctSet.has(idx)) {
                    label.classList.add('correct');
                }
                if (userSet.has(idx) && !correctSet.has(idx)) {
                    label.classList.add('incorrect');
                }
            }

            const span = document.createElement('span');
            span.textContent = ans;

            label.appendChild(input);
            label.appendChild(span);
            answersEl.appendChild(label);
        });

        if (alreadyChecked) {
            const correct = isUserCorrect(user, q);
            if (correct) {
                feedbackEl.textContent = 'Prawidłowa odpowiedź.';
                feedbackEl.classList.add('ok');
            } else {
                feedbackEl.textContent = 'Błędna odpowiedź.';
                feedbackEl.classList.add('bad');
            }
        }
    }

    if (alreadyChecked) {
        if (currentIndex === quizQuestions.length - 1) {
            checkNextBtn.textContent = 'Zakończ';
        } else {
            checkNextBtn.textContent = 'Dalej';
        }
    } else {
        checkNextBtn.textContent = 'Sprawdź';
    }

    prevBtn.disabled = currentIndex === 0;
}

// SPRAWDZENIE PYTANIA
function checkCurrentQuestion() {
    const q = quizQuestions[currentIndex];
    saveCurrentSelection();

    const user = userAnswers[currentIndex] || [];
    if (user.length === 0) {
        alert('Najpierw zaznacz odpowiedź lub ułóż kolejność.');
        return;
    }

    checkedQuestions[currentIndex] = true;
    renderQuestion();
}

// PODSUMOWANIE
function showSummary() {
    quizFinished = true;
    document.getElementById('quizScreen').classList.add('hidden');
    const summaryScreen = document.getElementById('summaryScreen');
    const summaryResult = document.getElementById('summaryResult');
    const summaryList = document.getElementById('summaryList');

    summaryScreen.classList.remove('hidden');
    summaryList.innerHTML = '';

    let correctCount = 0;

    quizQuestions.forEach((q, idx) => {
        const user = userAnswers[idx] || [];
        const isCorrect = isUserCorrect(user, q);
        if (isCorrect) correctCount++;

        const item = document.createElement('div');
        item.className = 'summary-item';

        const title = document.createElement('h3');
        title.textContent = `Pytanie ${idx + 1}: ${q.text}`;
        item.appendChild(title);

        const status = document.createElement('div');
        status.className = isCorrect ? 'summary-correct' : 'summary-wrong';
        status.textContent = isCorrect
            ? 'Odpowiedź prawidłowa.'
            : 'Odpowiedź błędna – z tym miałeś problem.';
        item.appendChild(status);

        if (q.type === 'sort') {
            const userBlock = document.createElement('div');
            userBlock.className = 'summary-block';
            const userTitle = document.createElement('div');
            userTitle.textContent = 'Twoja kolejność:';
            userBlock.appendChild(userTitle);

            if (user.length === 0) {
                const d = document.createElement('div');
                d.textContent = '- Nie ułożyłeś kolejności.';
                userBlock.appendChild(d);
            } else {
                user.forEach((aIdx, pos) => {
                    const d = document.createElement('div');
                    d.textContent = `${pos + 1}. ${q.answerLabels[aIdx]} ${q.answers[aIdx]}`;
                    userBlock.appendChild(d);
                });
            }
            item.appendChild(userBlock);

            const correctBlock = document.createElement('div');
            correctBlock.className = 'summary-block';
            const correctTitle = document.createElement('div');
            correctTitle.textContent = 'Prawidłowa kolejność:';
            correctBlock.appendChild(correctTitle);

            q.correctOrder.forEach((aIdx, pos) => {
                const d = document.createElement('div');
                d.textContent = `${pos + 1}. ${q.answerLabels[aIdx]} ${q.answers[aIdx]}`;
                correctBlock.appendChild(d);
            });
            item.appendChild(correctBlock);

        } else {
            const userBlock = document.createElement('div');
            userBlock.className = 'summary-block';
            const userTitle = document.createElement('div');
            userTitle.textContent = 'To zaznaczyłeś:';
            userBlock.appendChild(userTitle);

            if (user.length === 0) {
                const d = document.createElement('div');
                d.textContent = '- Nic nie zaznaczyłeś.';
                userBlock.appendChild(d);
            } else {
                user.forEach(aIdx => {
                    const d = document.createElement('div');
                    d.textContent = '- ' + q.answers[aIdx];
                    userBlock.appendChild(d);
                });
            }
            item.appendChild(userBlock);

            const correctBlock = document.createElement('div');
            correctBlock.className = 'summary-block';
            const correctTitle = document.createElement('div');
            correctTitle.textContent = 'Prawidłowe odpowiedzi:';
            correctBlock.appendChild(correctTitle);

            q.correctIndexes.forEach(aIdx => {
                const d = document.createElement('div');
                d.textContent = '- ' + q.answers[aIdx];
                correctBlock.appendChild(d);
            });
            item.appendChild(correctBlock);
        }

        summaryList.appendChild(item);
    });

    summaryResult.textContent = `Wynik: ${correctCount} z ${quizQuestions.length} prawidłowych odpowiedzi.`;
}

// RESET DO MENU
function goToMenu() {
    document.getElementById('menuScreen').classList.remove('hidden');
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('summaryScreen').classList.add('hidden');
    quizFinished = false;
}

// ZDARZENIA
document.getElementById('startBtn').addEventListener('click', () => {
    const raw = document.getElementById('questionsInput').value;
    allQuestions = parseQuestions(raw);
    if (allQuestions.length === 0) {
        alert('Brak poprawnie sparsowanych pytań. Sprawdź format.');
        return;
    }

    const desired = parseInt(document.getElementById('questionCount').value, 10) || 1;
    const count = Math.min(Math.max(1, desired), allQuestions.length);

    quizQuestions = pickRandomQuestions(allQuestions, count);
    currentIndex = 0;
    userAnswers = new Array(quizQuestions.length).fill(null).map(() => []);
    checkedQuestions = new Array(quizQuestions.length).fill(false);
    quizFinished = false;

    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('summaryScreen').classList.add('hidden');
    document.getElementById('quizScreen').classList.remove('hidden');

    renderQuestion();
});

document.getElementById('backToMenuBtn').addEventListener('click', () => {
    goToMenu();
});

document.getElementById('summaryBackToMenuBtn').addEventListener('click', () => {
    goToMenu();
});

document.getElementById('prevQuestionBtn').addEventListener('click', () => {
    saveCurrentSelection();
    if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
    }
});

document.getElementById('checkNextBtn').addEventListener('click', () => {
    if (!checkedQuestions[currentIndex]) {
        checkCurrentQuestion();
    } else {
        saveCurrentSelection();
        if (currentIndex === quizQuestions.length - 1) {
            showSummary();
        } else {
            currentIndex++;
            renderQuestion();
        }
    }
});
</script>
</body>
</html>
